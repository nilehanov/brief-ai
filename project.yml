name: Brief
options:
  bundleIdPrefix: com.nilehanov
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.1"
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: KWQTH8W4TL
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  Brief:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Brief
    info:
      path: Brief/Info.plist
      properties:
        CFBundleDisplayName: "Brief: Meeting AI"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nilehanov.brief
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: Brief/Brief.entitlements
      properties:
        com.apple.security.app-sandbox: true
  BriefTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - BriefTests
    dependencies:
      - target: Brief
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nilehanov.brief.tests
